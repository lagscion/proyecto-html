<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/payment.css">
    <title>Document</title>
    
</head>
<body>
<div class="payment-container">
    <header class="header">
        <button class="btn-icon" aria-label="Back">
            <a href="travel.html"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg></a>
        </button>
        <h1 class="title-lg">Payment Methods</h1>
    </header>

    <div class="search-wrapper">
        <div class="search-input-container">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
            <input type="search" placeholder="Search payment methods" class="input-search">
        </div>
    </div>

    <main class="payment-list">
        <article class="payment-card" role="button" tabindex="0">
            <div class="card-info">
                <div class="method-icon card-mastercard"><img src="../assets/icons/png-clipart-mastercard-credit-card-mastercard-logo-mastercard-logo-love-text-removebg-preview.png" alt=""></div>
                <div class="method-details">
                    <p class="method-number">**** **** **** 1234</p>
                    <p class="method-expiry">Expires 12/25</p>
                </div>
            </div>
            <div class="card-actions">
                <span class="badge-default">Default</span>
                <button class="btn-kebab" aria-label="More options">⋮</button>
            </div>
        </article>

        <article class="payment-card" role="button" tabindex="0">
            <div class="card-info">
                <div class="method-icon card-visa"><img src="../assets/icons/46cef9b13d991ea91b736defe437b409-removebg-preview.png" alt=""></div>
                <div class="method-details">
                    <p class="method-number">**** **** **** 5678</p>
                    <p class="method-expiry">Expires 01/26</p>
                </div>
            </div>
            <div class="card-actions">
                <button class="btn-icon-action" aria-label="Edit">✎</button>
                <button class="btn-icon-action btn-delete" aria-label="Delete">🗑</button>
            </div>
        </article>

        <article class="payment-card" role="button" tabindex="0">
            <div class="card-info">
                <div class="method-icon card-paypal"><img src="../assets/icons/unnamed-removebg-preview.png" alt=""></div>
                <div class="method-details">
                    <p class="method-number">PayPal</p>
                </div>
            </div>
            <div class="card-actions">
                <button class="btn-icon-action" aria-label="Edit">✎</button>
                <button class="btn-icon-action btn-delete" aria-label="Delete">🗑</button>
            </div>
        </article>
    </main>

    <footer class="footer-cta">
        <button class="btn-primary">Add New Method</button>
    </footer>
</div>
</body>
</html>
